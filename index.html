<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Lernkarten — Alex</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>

<body>

<header class="header">

    <div class="header-row">

        <!-- LINKS: STARTSEITE -->
        <button id="homeBtn" class="menu-btn">Startseite</button>

        <!-- TITEL -->
        <h1 class="title">
            Lernprogramm Fachinformatiker<br>
            für Anwendungsentwicklung
        </h1>

        <!-- RECHTS: MENÜ -->
        <button id="menuBtn" class="icon-btn">Menü</button>

    </div>

</header>

<!-- RIGHT SIDEBAR (MENÜ) -->
<aside id="sidebar-right" class="sidebar right">
    <div id="sidebarRightContent"></div>
</aside>

<main id="content">

    <!-- STARTSEITE -->
    <section id="startScreen">
        <div class="welcome-card">
            <h2>Willkommen!</h2>
            <p>Wähle ein Lernfeld im Menü aus.</p>
        </div>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="screen hidden">
        <div class="quiz-card">

            <h2 id="frage"></h2>
            <p id="frageCounter"></p>

            <div id="antworten"></div>

            <button id="weiterBtn" class="next-btn hidden">Weiter →</button>

            <div class="fragen-nav" id="fragenNav"></div>

            <div class="lf-progress">
                <div class="lf-progress-bar"><div></div></div>
                <span id="lfProgressText">0%</span>
            </div>

        </div>
    </section>

</main>

<div id="overlay" class="overlay hidden"></div>

</body>
</html>
